api_platform:
    title: Api - Aides Territoires
    description: "
            <h2><strong>Pour l'autorisation sur cet outil, vous devez remplir le champ de la manière suivante : Bearer [token]</strong></h2>
            <table>
                <thead>
                    <tr><th>Version</th><th>Description des changements</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1.8 (actuelle)</td>
                        <td>
                            <h3>Normalization :</h3>
                            <p><strong>Tous les paramètres de recherche ainsi que les champs de données sont maintenant en snake_case, ex: category_slugs, zip_code...</strong></p>
                            <p>Vos anciens paramètres devraient toujours foncitonner mais <strong>nous vous invitons fortement à les mettre à jour</strong>.</p>
                            <h3>Aides :</h3>
                            <h4>Modifications :</h4>
                            <h5>Recherche :</h5>
                            <ul>
                                <li><em>text</em> => <strong>keyword</strong></li>
                                <li><em>targeted_audiences</em> => <strong>organization_type_slugs</strong></li>
                                <li><em>categories</em> => <strong>category_slugs</strong></li>
                                <li><em>aid_type</em> => <strong>aidTypeGroupSlug</strong></li>
                                <li>
                                    <p><em>financial_aids</em> && <em>technical_aids</em> => <strong>aidTypeSlugs</strong></p>
                                    <p>Ces deux champs ont fusionnés en un seul champ <strong>aidTypeSlugs</strong> qui prend en compte les deux types d'aides.</p>
                                    <p>Vous pouvez également rechercher sur plusieurs types en ajoutant plusieurs fois le même paramètre, ex: aidTypeSlugs=recoverable-advance&aidTypeSlugs=legal-engineering.</p>
                                </li>
                                <li><em>mobilization_step</em> => <strong>aidStepSlugs</strong>. Vous pouvez maintenant passer plusieurs le paramètre avec des valeurs différentes.</li>
                            </ul>
                            <h4>Ajouts :</h4>
                            <ul>
                                <li><strong>organization_type_ids</strong> : Recherche sur les types de structure par ids, ex: organizationTypeIds=1&organizationTypeIds=2</li>
                                <li><strong>category_ids</strong> : Recherche sur les thématiques par ids, ex: category_ids=1&category_ids=2</li>
                            </ul>
                            <h5>Données :</h5>
                            <ul>
                                <li></li>
                            </ul>
                        </td>
                    </tr>
                    <tr><td>1.6</td><td><strong>Périmètres</strong> ajout du point d’entrée <code>perimeters/data</code></td></tr>
                    <tr><td>1.5</td><td><strong>Aides</strong> : ajout des champs <code>name_initial</code>, <code>import_data_url</code>, <code>import_data_mention</code> et <code>import_share_licence</code></td></tr>
                    <tr><td>1.4</td><td><strong>Aides</strong> : ajout du champ <code>is_call_for_project</code><br>Ajout de nouveaux points d'entrée : <strong>Programmes</strong>, <strong>Thématiques</strong> et <strong>Périmètres</strong><br>Documentation de l'API au format OpenAPI 3</td></tr>
                    <tr><td>1.3</td><td><strong>Aides</strong> : ajout des champs <code>loan_amount</code> and <code>recoverable_advance_amount</code><br><strong>Aides</strong> : suppression du champ <code>tags</code></td></tr>
                    <tr><td>1.2</td><td><strong>Aides</strong> : ajout du champ <code>categories</code></td></tr>
                    <tr><td>1.1</td><td><strong>Aides</strong> : ajout du champ <code>programs</code></td></tr>
                    <tr><td>1.0</td><td>Première version de l'API 🎉<br> Points d'entrée : <strong>Aides</strong> et <strong>Porteurs d'aides</strong></td></tr>
                </tbody>
            </table>
            "
    version: 1.8
    formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
    docs_formats:
        jsonld: ['application/ld+json']
        jsonopenapi: ['application/vnd.openapi+json']
        html: ['text/html']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
        extra_properties:
            standard_put: true
            rfc_7807_compliant_errors: true
        normalization_context:
            skip_null_values: false
        pagination_maximum_items_per_page: 100
    event_listeners_backward_compatibility_layer: false
    keep_legacy_inflector: false
    swagger:
        api_keys:
            JWT:
                name: Authorization
                type: header
        